<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Prospect Previews</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #191816;
      --paper: #f8f4ed;
      --muted: #6f6860;
      --red: #cf190d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    main {
      width: min(920px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }
    h1 {
      margin: 0 0 12px;
      font-family: Georgia, serif;
      font-size: clamp(44px, 7vw, 86px);
      line-height: .95;
      letter-spacing: 0;
    }
    p {
      max-width: 620px;
      margin: 0 0 34px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }
    a {
      display: inline-flex;
      align-items: center;
      min-height: 54px;
      padding: 0 22px;
      background: var(--ink);
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
    a:hover { background: var(--red); }
    .rule {
      width: 140px;
      height: 6px;
      margin-bottom: 28px;
      background: var(--red);
    }
  </style>
</head>
<body>
  <main>
    <div class="rule"></div>
    <h1>Prospect previews</h1>
    <p>Private preview pages for outreach carousel samples.</p>
    <a href="/prospects/emergency-dentist-of-austin/">Open Emergency Dentist of Austin</a>
  </main>
</body>
</html>
