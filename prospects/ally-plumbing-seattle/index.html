<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ally Plumbing - Sample Carousel</title>
  <style>
    body { margin:0; background:#101418; color:#f7f4ec; font-family:Segoe UI, Arial, sans-serif; }
    header { padding:28px 20px 14px; max-width:760px; margin:auto; }
    h1 { margin:0; font-size:clamp(28px, 7vw, 54px); line-height:1.02; }
    p { color:#c9d0d4; font-size:16px; line-height:1.5; }
    main { max-width:760px; margin:0 auto; padding:0 14px 40px; display:grid; gap:18px; }
    figure { margin:0; background:#1c2228; }
    img { width:100%; display:block; }
    .meta { color:#f2b84b; letter-spacing:.08em; text-transform:uppercase; font-size:12px; }
  </style>
</head>
<body>
  <header>
    <div class="meta">custom sample / Seattle</div>
    <h1>Ally Plumbing</h1>
    <p>Five sample carousel posts written for your audience and adaptable for Instagram, TikTok, Facebook, and YouTube Shorts.</p>
  </header>
  <main><figure><img src="ally-plumbing-seattle-carousel-01.png" alt="Ally Plumbing carousel 1"></figure>
<figure><img src="ally-plumbing-seattle-carousel-02.png" alt="Ally Plumbing carousel 2"></figure>
<figure><img src="ally-plumbing-seattle-carousel-03.png" alt="Ally Plumbing carousel 3"></figure>
<figure><img src="ally-plumbing-seattle-carousel-04.png" alt="Ally Plumbing carousel 4"></figure>
<figure><img src="ally-plumbing-seattle-carousel-05.png" alt="Ally Plumbing carousel 5"></figure></main>
</body>
</html>
